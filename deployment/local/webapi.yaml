apiVersion: apps/v1
kind: Deployment
metadata:
  name: character-catalog-webapi-local
  namespace: character-catalog-local
  labels:
    app: character-catalog-webapi-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: character-catalog-webapi-local
  template:
    metadata:
      labels:
        app: character-catalog-webapi-local
    spec:
      containers:
        - name: character-catalog-webapi
          image: balkfet-webapi:latest
          imagePullPolicy: Never
          env:
            - name: MongoDb__ConneX
              valueFrom:
                secretKeyRef:
                  name: character-catalog-secrets-local
                  key: mongodb-url
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: character-catalog-webapi-local
  namespace: character-catalog-local
spec:
  selector:
    app: character-catalog-webapi-local
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 5000
  type: ClusterIP
